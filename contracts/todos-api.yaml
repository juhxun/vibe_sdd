openapi: 3.0.3
info:
  title: Todo API
  version: 1.0.0
paths:
  /:
    get:
      summary: 메인 화면
      responses:
        '200':
          description: HTML 페이지
  /health:
    get:
      summary: 상태 확인
      responses:
        '200':
          description: 정상 상태
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /api/todos:
    get:
      summary: 할 일 목록 조회
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [all, active, completed]
          required: false
          description: 필터 상태
      responses:
        '200':
          description: 할 일 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TodoResponse'
    post:
      summary: 할 일 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoCreate'
      responses:
        '201':
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoResponse'
        '422':
          description: 입력값 오류
  /api/todos/{todo_id}:
    patch:
      summary: 할 일 완료 토글
      parameters:
        - in: path
          name: todo_id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoUpdate'
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoResponse'
        '404':
          description: 할 일을 찾을 수 없음
    delete:
      summary: 할 일 삭제
      parameters:
        - in: path
          name: todo_id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: 삭제 성공
        '404':
          description: 할 일을 찾을 수 없음
components:
  schemas:
    TodoCreate:
      type: object
      properties:
        title:
          type: string
          example: 새 할 일
      required:
        - title
    TodoUpdate:
      type: object
      properties:
        completed:
          type: boolean
          example: true
      required:
        - completed
    TodoResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: 새 할 일
        completed:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - title
        - completed
        - created_at
        - updated_at
