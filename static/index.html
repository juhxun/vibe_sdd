<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 할 일</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .todos-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .todo-item:hover {
            background: #f0f1f5;
            transform: translateX(5px);
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #999;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .todo-text {
            flex: 1;
            color: #333;
            word-break: break-word;
        }

        .delete-btn {
            background: #ff6b6b;
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 5px;
        }

        .delete-btn:hover {
            background: #ff5252;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 30px 10px;
            font-size: 16px;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 오늘의 할 일</h1>

        <div class="error" id="error"></div>

        <div class="input-group">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="할 일을 입력하세요..."
                @keyup.enter="addTodo"
            >
            <button onclick="addTodo()">추가</button>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">전체</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="completedCount">0</div>
                <div class="stat-label">완료</div>
            </div>
        </div>

        <div class="todos-list" id="todosList">
            <div class="empty-message">할 일을 추가해보세요!</div>
        </div>
    </div>

    <script>
        const apiUrl = '/api/todos';
        const todoInput = document.getElementById('todoInput');
        const todosList = document.getElementById('todosList');
        const errorDiv = document.getElementById('error');

        // 페이지 로드 시 할 일 목록 가져오기
        window.addEventListener('load', loadTodos);

        // Enter 키로 추가
        todoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTodo();
            }
        });

        // 할 일 목록 조회
        async function loadTodos() {
            try {
                const response = await fetch(apiUrl);
                const todos = await response.json();
                renderTodos(todos);
                updateStats(todos);
            } catch (error) {
                showError('할 일을 불러올 수 없습니다.');
                console.error('Error:', error);
            }
        }

        // 할 일 추가
        async function addTodo() {
            const title = todoInput.value.trim();

            if (!title) {
                showError('할 일을 입력하세요.');
                return;
            }

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ title })
                });

                if (response.ok) {
                    todoInput.value = '';
                    loadTodos();
                } else {
                    showError('할 일 추가에 실패했습니다.');
                }
            } catch (error) {
                showError('할 일 추가 중 오류가 발생했습니다.');
                console.error('Error:', error);
            }
        }

        // 할 일 완료 토글
        async function toggleTodo(id, completed, title) {
            try {
                const response = await fetch(`${apiUrl}/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        title: title,
                        completed: !completed 
                    })
                });

                if (response.ok) {
                    loadTodos();
                } else {
                    showError('상태 변경에 실패했습니다.');
                }
            } catch (error) {
                showError('상태 변경 중 오류가 발생했습니다.');
                console.error('Error:', error);
            }
        }

        // 할 일 삭제
        async function deleteTodo(id) {
            if (!confirm('정말 삭제하시겠습니까?')) {
                return;
            }

            try {
                const response = await fetch(`${apiUrl}/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadTodos();
                } else {
                    showError('삭제에 실패했습니다.');
                }
            } catch (error) {
                showError('삭제 중 오류가 발생했습니다.');
                console.error('Error:', error);
            }
        }

        // 할 일 렌더링
        function renderTodos(todos) {
            if (todos.length === 0) {
                todosList.innerHTML = '<div class="empty-message">할 일을 추가해보세요!</div>';
                return;
            }

            todosList.innerHTML = todos.map(todo => `
                <div class="todo-item ${todo.completed ? 'completed' : ''}">
                    <input 
                        type="checkbox" 
                        ${todo.completed ? 'checked' : ''}
                        onchange="toggleTodo(${todo.id}, ${todo.completed}, '${todo.title.replace(/'/g, "\\'")}')"
                    >
                    <span class="todo-text">${escapeHtml(todo.title)}</span>
                    <button class="delete-btn" onclick="deleteTodo(${todo.id})">삭제</button>
                </div>
            `).join('');
        }

        // 통계 업데이트
        function updateStats(todos) {
            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('completedCount').textContent = completed;
        }

        // 에러 메시지 표시
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.add('show');

            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 3000);
        }

        // HTML 이스케이프 (XSS 방지)
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
